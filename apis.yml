aid: federal-student-aid
name: Federal Student Aid
description: >-
  The Federal Student Aid (FSA) office of the U.S. Department of Education
  provides grants, loans, and work-study funds to eligible students enrolled
  in college or career school. FSA operates StudentAid.gov as the consumer
  portal for managing federal student loans, completing the FAFSA, and
  exploring repayment options. FSA does not currently publish a public,
  open developer API program; aggregate higher education and aid data is
  redistributed through the Department of Education's open data programs
  such as the College Scorecard API.
