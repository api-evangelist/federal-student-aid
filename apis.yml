apis:
  - aid: federal-student-aid:studentaid-gov
    name: StudentAid.gov
    description: >-
      StudentAid.gov is the official consumer platform for U.S. federal
      student aid. Borrowers and students use the site to complete the FAFSA,
      manage federal loans, review repayment plans, and access aid resources.
      The platform itself is not exposed as a public REST API today.
    humanURL: https://studentaid.gov
    tags:
      - Financial Aid
      - Loans
      - Student Aid
    properties:
      - type: Website
        url: https://studentaid.gov
      - type: FAFSA
        url: https://studentaid.gov/h/apply-for-aid/fafsa
      - type: Loan Repayment
        url: https://studentaid.gov/manage-loans/repayment
  - aid: federal-student-aid:college-scorecard
    name: College Scorecard API
    description: >-
      The College Scorecard API, operated by the U.S. Department of Education
      via api.data.gov, exposes institution-level data including federal aid
      participation, costs, completion rates, and post-college outcomes that
      complement Federal Student Aid program information.
    humanURL: https://collegescorecard.ed.gov/data/documentation/
    baseURL: https://api.data.gov/ed/collegescorecard/v1
    tags:
      - Education
      - Open Data
      - Higher Education
    properties:
      - type: Documentation
        url: https://collegescorecard.ed.gov/data/documentation/
      - type: SignUp
        url: https://api.data.gov/signup/
